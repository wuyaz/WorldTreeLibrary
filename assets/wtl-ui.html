<div id="wtl-root" class="wtl-card">
  <div id="wtl-page-main">
    <div class="wtl-header">
      <h3 style="margin: 0; font-size: 16px; color: var(--wtl-accent);">
        <i class="fa-solid fa-tree"></i> WorldTreeLibrary
      </h3>
      <span id="wtl-status" style="font-size: 12px; opacity: 0.7; display: flex; align-items: center; gap: 4px;">
        <div style="width:8px; height:8px; border-radius:50%; background:var(--wtl-accent);"></div> 空闲
      </span>
    </div>

    <div class="wtl-actions">
      <div class="wtl-actions-row">
        <button id="wtl-run" class="menu_button" style="background: color-mix(in srgb, var(--wtl-accent) 20%, transparent); border-color: var(--wtl-accent);">
          <span>立即填表</span><i class="fa-solid fa-bolt"></i>
        </button>

        <div class="wtl-combo-group" title="自动填表：当聊天新增消息时按频率触发。">
          <button id="wtl-auto-toggle" class="menu_button"><span>自动填表：关</span><i class="fa-solid fa-play"></i></button>
          <div class="wtl-combo-item"><label>层数</label><input id="wtl-auto-floors" type="number" placeholder="4" /></div>
          <div class="wtl-combo-item"><label>频率</label><input id="wtl-auto-every" type="number" placeholder="1" /></div>
        </div>
      </div>

      <div class="wtl-actions-row">
        <div class="wtl-combo-group">
          <button id="wtl-batch" class="menu_button"><span>批量填表</span><i class="fa-solid fa-layer-group"></i></button>
          <div class="wtl-combo-item"><label>起</label><input id="wtl-batch-start" type="number" placeholder="0" /></div>
          <div class="wtl-combo-item"><label>止</label><input id="wtl-batch-end" type="number" placeholder="0" /></div>
          <div class="wtl-combo-item"><label>批</label><input id="wtl-batch-step" type="number" placeholder="10" /></div>
        </div>

        <div class="wtl-combo-group">
          <button id="wtl-history-back" class="menu_button" title="表格回退"><i class="fa-solid fa-arrow-left"></i> 回退</button>
          <button id="wtl-history-undo" class="menu_button" title="撤销回退">撤销 <i class="fa-solid fa-arrow-right"></i></button>
        </div>
      </div>

      <div class="wtl-actions-row">
        <button id="wtl-edit-table" class="menu_button"><span>编辑表格</span><i class="fa-solid fa-pen"></i></button>
        <button id="wtl-edit-template" class="menu_button"><span>编辑模板</span><i class="fa-solid fa-wand-magic-sparkles"></i></button>
        <button id="wtl-open-config" class="menu_button"><span>填表配置</span><i class="fa-solid fa-sliders"></i></button>
        <button id="wtl-clear-table" class="menu_button" style="color:#ff6b6b; border-color:rgba(255,107,107,0.3);"><span>清空表格</span><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>

    <div class="wtl-section wtl-main" style="margin-top: 0; border: none; padding: 0;">
      <div id="wtl-table-tabs" class="wtl-tab-list"></div>
      <div class="wtl-table-panel">
        <div id="wtl-table-resize" class="wtl-table-resize">
          <table class="wtl-table wtl-table-view" id="wtl-table-view">
            <thead id="wtl-preview-head"></thead>
            <tbody id="wtl-preview-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="wtl-template-editor" style="display:none; position:absolute; inset:0; background:var(--ui-color-main); z-index:10; flex-direction:column; padding:10px;">
      <div class="wtl-header">
        <div class="wtl-section-title" style="margin:0;">表格模板编辑器</div>
        <button id="wtl-editor-close" class="menu_button" onclick="document.getElementById('wtl-template-editor').style.display='none'"><i class="fa-solid fa-arrow-left"></i> 返回</button>
      </div>
      <div class="wtl-editor-root" style="flex:1; overflow-y:auto;">
        <div class="wtl-editor-grid">
          <div class="wtl-editor-panel">
            <div class="wtl-row" style="justify-content: space-between;">
              <div class="wtl-editor-title">章节列表</div>
              <div class="wtl-editor-inline">
                <button id="wtl-section-add" class="menu_button"><i class="fa-solid fa-plus"></i></button>
                <button id="wtl-section-apply" class="menu_button"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
              </div>
            </div>
            <div id="wtl-section-list" class="wtl-editor-list"></div>
          </div>
          <div class="wtl-editor-panel">
            <div class="wtl-row" style="justify-content: space-between;">
              <div class="wtl-editor-title">列列表</div>
              <div class="wtl-editor-inline">
                <button id="wtl-column-add" class="menu_button"><i class="fa-solid fa-plus"></i></button>
              </div>
            </div>
            <div id="wtl-column-list" class="wtl-editor-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="wtl-page-config" style="display:none; overflow-y:auto; padding-right:6px;">
    <div class="wtl-header" style="position: sticky; top: 0; background: var(--ui-color-main); z-index: 5;">
      <h3 style="margin: 0; font-size: 16px;">配置中心</h3>
      <button id="wtl-back-main" class="menu_button"><i class="fa-solid fa-arrow-left"></i> 返回首页</button>
    </div>

    <div class="wtl-section">
      <div class="wtl-section-title">填表模式</div>
      <select id="wtl-send-mode" class="text_pole" style="width: 100%; margin-bottom: 8px;">
        <option value="st">使用酒馆生成</option>
        <option value="external">调用第三方 API</option>
      </select>
      <div id="wtl-mode-st" class="wtl-section" style="margin-top:8px;"></div>
      <div id="wtl-mode-external" class="wtl-section" style="margin-top:8px; display:none;"></div>
    </div>

    <div class="wtl-section">
      <div class="wtl-row" style="justify-content: space-between;">
        <div class="wtl-section-title">提示词与模板编辑</div>
        <button id="wtl-reset-global" class="menu_button" style="color:#ff6b6b; border-color:rgba(255,107,107,0.3);"><i class="fa-solid fa-rotate-left"></i> 恢复全部默认</button>
      </div>
    </div>
  </div>

  <textarea id="wtl-table-md" class="text_pole" style="display:none;"></textarea>
  <div id="wtl-modal" class="wtl-modal" style="display:none;">
    <div class="wtl-modal-card">
      <div class="wtl-row" style="justify-content: space-between; border-bottom: 1px solid var(--wtl-border); padding-bottom: 8px; margin-bottom: 10px;">
        <strong id="wtl-modal-title" style="color: var(--wtl-accent); font-size: 15px;"></strong>
        <button id="wtl-modal-close" class="menu_button" style="border:none; background:transparent;"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="wtl-modal-custom" style="display:none; margin-bottom:10px;"></div>
      <textarea id="wtl-modal-content" class="text_pole" rows="10" style="width: 100%; resize: vertical;"></textarea>
      <div id="wtl-modal-actions" class="wtl-row" style="justify-content: flex-end; margin-top: 12px; gap:8px;"></div>
    </div>
  </div>

  <div id="wtl-editor-overlay" class="wtl-editor-overlay" style="display:none;">
    <div class="wtl-editor-dialog"></div>
  </div>
</div>
