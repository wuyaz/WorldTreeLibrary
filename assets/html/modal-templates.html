<!-- Modal Templates for World Tree Library -->
<div id="wtl-modal-templates" style="display: none;">
  
  <!-- Confirm Dialog Template -->
  <div id="wtl-modal-confirm" class="wtl-modal">
    <h3 id="wtl-modal-confirm-title" class="wtl-modal-title">确认操作</h3>
    <div id="wtl-modal-confirm-message" class="wtl-modal-message">
      您确定要执行此操作吗？
    </div>
    <div class="wtl-modal-actions">
      <button id="wtl-modal-confirm-cancel" class="wtl-btn">取消</button>
      <button id="wtl-modal-confirm-ok" class="wtl-btn wtl-btn-primary">确定</button>
    </div>
  </div>
  
  <!-- Input Dialog Template -->
  <div id="wtl-modal-input" class="wtl-modal">
    <h3 id="wtl-modal-input-title" class="wtl-modal-title">输入信息</h3>
    <div id="wtl-modal-input-message" class="wtl-modal-message">
      请输入相关信息：
    </div>
    <div class="wtl-modal-field">
      <label id="wtl-modal-input-label" for="wtl-modal-input-field">输入框：</label>
      <input id="wtl-modal-input-field" type="text" class="wtl-input" />
    </div>
    <div class="wtl-modal-actions">
      <button id="wtl-modal-input-cancel" class="wtl-btn">取消</button>
      <button id="wtl-modal-input-ok" class="wtl-btn wtl-btn-primary">确定</button>
    </div>
  </div>
  
  <!-- Progress Dialog Template -->
  <div id="wtl-modal-progress" class="wtl-modal">
    <h3 id="wtl-modal-progress-title" class="wtl-modal-title">处理中...</h3>
    <div class="wtl-modal-progress-container">
      <div id="wtl-modal-progress-bar" class="wtl-modal-progress-bar"></div>
    </div>
    <div id="wtl-modal-progress-message" class="wtl-modal-message">
      正在处理您的请求，请稍候...
    </div>
  </div>
  
  <!-- List Dialog Template -->
  <div id="wtl-modal-list" class="wtl-modal">
    <h3 id="wtl-modal-list-title" class="wtl-modal-title">选择项目</h3>
    <div id="wtl-modal-list-message" class="wtl-modal-message">
      请从列表中选择一项：
    </div>
    <ul id="wtl-modal-list-items" class="wtl-modal-list">
      <!-- List items will be dynamically added -->
    </ul>
    <div class="wtl-modal-actions">
      <button id="wtl-modal-list-cancel" class="wtl-btn">取消</button>
      <button id="wtl-modal-list-ok" class="wtl-btn wtl-btn-primary">确定</button>
    </div>
  </div>
  
  <!-- Settings Dialog Template -->
  <div id="wtl-modal-settings" class="wtl-modal">
    <h3 id="wtl-modal-settings-title" class="wtl-modal-title">设置</h3>
    <div class="wtl-modal-settings-content">
      <!-- Settings fields will be dynamically added -->
    </div>
    <div class="wtl-modal-actions">
      <button id="wtl-modal-settings-cancel" class="wtl-btn">取消</button>
      <button id="wtl-modal-settings-apply" class="wtl-btn wtl-btn-primary">应用</button>
    </div>
  </div>
  
  <!-- Loading Overlay Template -->
  <div id="wtl-modal-loading" class="wtl-modal-overlay">
    <div class="wtl-modal wtl-modal-loading">
      <div class="wtl-loading-spinner"></div>
      <div id="wtl-modal-loading-message" class="wtl-modal-message">
        加载中...
      </div>
    </div>
  </div>
  
  <!-- Notification Template -->
  <div id="wtl-modal-notification" class="wtl-modal">
    <h3 id="wtl-modal-notification-title" class="wtl-modal-title">通知</h3>
    <div id="wtl-modal-notification-message" class="wtl-modal-message">
      <!-- Notification message will be dynamically added -->
    </div>
    <div class="wtl-modal-actions">
      <button id="wtl-modal-notification-close" class="wtl-btn">关闭</button>
    </div>
  </div>
  
</div>
